name: Build OpenCord

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:

    strategy:
      fail-fast: false
      matrix:
        platform:
          - windows-latest
          - ubuntu-latest
          - macos-latest

    runs-on: ${{ matrix.platform }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf


      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22


      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable


      - name: Install dependencies
        run: npm install


      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        with:
          tagName: ${{ github.ref_name }}
          releaseName: "OpenCord ${{ github.ref_name }}"
          releaseBody: "Nouvelle version OpenCord"
          releaseDraft: false
          prerelease: false
